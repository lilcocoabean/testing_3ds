<html>
    <head>
        <meta charset="utf-8">
    </head>
    <body>
        <p>redirecting...</p>
        <script type="text/javascript">
            var ua = navigator.userAgent.toLowerCase();

            if (ua.indexOf("nintendo") !== -1 && ua.indexOf("3ds") !== -1) {
                location.replace("./3ds");
            } else {
                location.replace("./non");
            }
        </script>
    </body>
</html>
