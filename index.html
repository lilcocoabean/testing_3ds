    <body>
        <p>redirecting...</p>
        <script type="text/javascript">
            if(navigator.userAgent.indexOf("Nintendo 3DS") == -1) { // If the user agent does not contain "Nintendo 3DS"
                location.replace("./non"); // Redirect to another page
            } else {
                location.replace("./3ds")
            }
        </script>
    </body>
